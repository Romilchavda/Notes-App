<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App Mobile</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root">
        <!-- Loading message jab tak React load na ho -->
        <div class="flex items-center justify-center h-screen">
            <p class="text-gray-500 animate-pulse">Loading App...</p>
        </div>
    </div>

    <!-- Hum dono files ko ek saath load karenge -->
    <script type="text/babel" src="./src/App.jsx"></script>
    <script type="text/babel" src="./src/main.jsx"></script>

    <!-- Error check karne ke liye script -->
    <script>
        window.onerror = function(msg, url, line) {
            alert("Error: " + msg + "\nLine: " + line);
        };
    </script>
</body>
</html>
